<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Harian</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1F4E78;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }
        input[type="date"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #1F4E78;
            color: white;
            text-align: center;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-export { background-color: #28a745; }
        .btn-export:hover { background-color: #218838; }
        .btn-reset { background-color: #dc3545; }
        .btn-reset:hover { background-color: #c82333; }
        
        .summary {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>REKAP ABSENSI HARIAN</h2>
    
    <div class="header-controls">
        <div>
            <label for="tanggal"><strong>Tanggal: </strong></label>
            <input type="date" id="tanggal">
        </div>
    </div>

    <div class="summary">
        <span>Total Hadir: <span id="totHadir" style="color: green;">0</span></span>
        <span>Total Izin: <span id="totIzin" style="color: orange;">0</span></span>
        <span>Total Tidak Hadir: <span id="totAlpa" style="color: red;">0</span></span>
    </div>

    <table id="absenTable">
        <thead>
            <tr>
                <th width="5%">No</th>
                <th width="30%">Nama Anggota</th>
                <th width="20%">Status Kehadiran</th>
                <th width="45%">Keterangan</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data akan di-generate oleh JavaScript -->
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn-reset" onclick="resetForm()">Reset Form</button>
        <button class="btn-export" onclick="exportToCSV()">Export ke Excel (CSV)</button>
    </div>
</div>

<script>
    // Ganti daftar nama di bawah ini dengan nama asli tim kamu (maksimal berapa saja)
    const daftarNama = [
        "Andi Pratama",
        "Budi Santoso",
        "Citra Lestari",
        "Dian Sastro",
        "Eko Purnomo"
        // Tambahkan nama lain di sini, gunakan tanda kutip dan pisahkan dengan koma
    ];

    const tableBody = document.getElementById('tableBody');

    // Fungsi untuk membuat baris tabel
    function renderTable() {
        tableBody.innerHTML = '';
        daftarNama.forEach((nama, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center">${index + 1}</td>
                <td>${nama}</td>
                <td>
                    <select class="status-select" onchange="hitungRekap()">
                        <option value="">-- Pilih --</option>
                        <option value="Hadir">Hadir</option>
                        <option value="Izin">Izin</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                    </select>
                </td>
                <td>
                    <input type="text" class="ket-input" placeholder="Isi jika Izin/Tidak Hadir">
                </td>
            `;
            tableBody.appendChild(tr);
        });
        document.getElementById('tanggal').valueAsDate = new Date();
        hitungRekap();
    }

    // Fungsi menghitung total
    function hitungRekap() {
        let hadir = 0, izin = 0, alpa = 0;
        const selects = document.querySelectorAll('.status-select');
        
        selects.forEach(select => {
            if(select.value === "Hadir") hadir++;
            else if(select.value === "Izin") izin++;
            else if(select.value === "Tidak Hadir") alpa++;
        });

        document.getElementById('totHadir').innerText = hadir;
        document.getElementById('totIzin').innerText = izin;
        document.getElementById('totAlpa').innerText = alpa;
    }

    // Fungsi reset
    function resetForm() {
        if(confirm("Apakah kamu yakin ingin mereset semua data hari ini?")) {
            renderTable();
        }
    }

    // Fungsi Export ke CSV (Bisa dibuka di Excel)
    function exportToCSV() {
        let tanggal = document.getElementById('tanggal').value;
        if(!tanggal) tanggal = "Tanpa_Tanggal";
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Tanggal : " + tanggal + "\n\n";
        csvContent += "No,Nama Anggota,Status Kehadiran,Keterangan\n";

        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach((row, index) => {
            const nama = daftarNama[index];
            const status = row.querySelector('.status-select').value || "-";
            let keterangan = row.querySelector('.ket-input').value || "-";
            
            // Menghindari error CSV jika ada koma di keterangan
            keterangan = keterangan.replace(/,/g, " "); 

            csvContent += `${index + 1},${nama},${status},${keterangan}\n`;
        });

        // Tambahkan rekap di bawah CSV
        csvContent += `\nRekapitulasi\n`;
        csvContent += `Total Hadir,${document.getElementById('totHadir').innerText}\n`;
        csvContent += `Total Izin,${document.getElementById('totIzin').innerText}\n`;
        csvContent += `Total Tidak Hadir,${document.getElementById('totAlpa').innerText}\n`;

        // Proses Download
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Absensi_${tanggal}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Jalankan saat pertama kali dibuka
    renderTable();
</script>

</body>
</html>
